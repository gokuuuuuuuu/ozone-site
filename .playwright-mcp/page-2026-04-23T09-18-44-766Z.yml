              - heading "California DMV · AV Collision Reports" [level=2] [ref=e134]
              - generic [ref=e135]: United States · California · 2014 – 2025 · CVC §38750 mandate · 913 records
              - generic [ref=e136]: State regulator·ADS test fleet·OL-316 form
            - generic [ref=e137]:
              - paragraph [ref=e138]: The primary state-level source of ADS collision reports in the United States. Under California Vehicle Code §38750, every manufacturer holding a DMV Autonomous Vehicle Testing or Deployment Permit must report any collision involving an autonomous test vehicle within 10 days. Ozone aggregates both digitisation phases into 913 incident records from October 2014 to December 2025 — the longest continuous state-level AV collision time series currently available. The corpus is dominated by San Francisco (644, 70.5%) and the Mountain View / Silicon Valley belt where commercial AV deployment is most concentrated.
