              - generic [ref=e215]: Federal·ADS + ADAS·Monthly submissions
            - generic [ref=e216]:
              - paragraph [ref=e217]: The federal-level crash reporting mandate for automated driving systems. SGO 2021-01 requires manufacturers and operators of SAE Level 2 ADAS or Level 3–5 ADS vehicles to report any crash occurring while automation is engaged — or within 30 seconds of disengagement — within 1 day for fatal / hospitalised / airbag / tow-away crashes and within 10 days otherwise. Ozone ingests the monthly public releases and separates the ADS and ADAS sub-corpora for direct AV-vs-ADAS safety rate estimation.
